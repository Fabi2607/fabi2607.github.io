<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#000000" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="Cave Viewer" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <title>Cave Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; width: 100% !important; height: 100% !important; }
    #info {
      position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
      color: #ccc; font: 13px/1 monospace; background: rgba(0,0,0,.5);
      padding: 4px 10px; border-radius: 4px; pointer-events: none;
      white-space: nowrap;
    }
    #hints {
      position: absolute; top: 10px; right: 12px;
      color: #888; font: 11px/1.7 monospace; text-align: right;
      pointer-events: none;
    }
    #toolbar {
      position: absolute; top: 10px; left: 12px;
      display: flex; flex-direction: column; gap: 2px;
      color: #ccc; font: 12px/1.8 monospace;
    }
    #toolbar label { cursor: pointer; user-select: none; }
    #toolbar input[type=checkbox] { cursor: pointer; margin-right: 5px; accent-color: #4af; }
    #toolbar .sub-ctrl {
      padding-left: 14px; display: flex; align-items: center; gap: 3px;
      color: #aaa; font-size: 11px;
    }
    #toolbar input[type=range] { width: 72px; cursor: pointer; accent-color: #4af; }
    #toolbar .ctrl-val { min-width: 28px; color: #888; }
    #proj-btn {
      margin-top: 4px; padding: 1px 6px;
      background: #333; color: #ccc; border: 1px solid #555;
      font: 12px/1.8 monospace; cursor: pointer; text-align: left;
    }
    #proj-btn:hover { background: #444; }
    #scalebar {
      position: absolute; bottom: 40px; left: 12px;
      color: #ccc; font: 11px/1 monospace;
      pointer-events: none;
    }
    #scalebar-line {
      border: 1px solid #aaa; border-top: none;
      height: 5px; margin-top: 3px;
    }
    #tooltip {
      position: absolute; display: none;
      background: rgba(0,0,0,.75); color: #eee;
      font: 12px/1 monospace; padding: 4px 8px;
      border-radius: 3px; pointer-events: none; white-space: nowrap;
    }
  </style>
  <script type="module" crossorigin src="/assets/index-COKfSASK.js"></script>
<link rel="manifest" href="/manifest.webmanifest"><script id="vite-plugin-pwa:register-sw" src="/registerSW.js"></script></head>
<body>
  <canvas></canvas>
  <div id="info">Loading…</div>
  <div id="hints">P – plan view<br>E – elevation<br>R – reset<br>O – ortho toggle</div>
</body>
</html>
